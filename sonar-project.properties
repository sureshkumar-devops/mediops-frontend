# SonarCloud project configuration for zen-pharma-frontend (React)
sonar.projectKey=w3logics_mediops-frontend
sonar.organization=w3logics
sonar.projectName=Mediops Frontend

sonar.sources=src
sonar.tests=src
sonar.test.inclusions=src/**/*.test.js,src/**/*.test.jsx,src/**/*.spec.js

# Jest LCOV coverage report — generated by 'npm test -- --coverage'
sonar.javascript.lcov.reportPaths=coverage/lcov.info

sonar.sourceEncoding=UTF-8

sonar.exclusions=node_modules/**,build/**,coverage/**,public/**
sonar.coverage.exclusions=src/index.js,src/reportWebVitals.js