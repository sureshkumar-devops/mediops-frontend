name: Frontend CI/CD

on:
  push:
    branches:
      - master
      - dev
  pull_request:
    branches:
      - master
      
permissions:
  id-token: write # required for OIDC token request
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Add this line here
  ECR_REPOSITORY: pharma-ui
  IMAGE_TAG: ${{ github.sha }}


jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Code Checkout
        uses: actions/checkout@v4
  
      - name: setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npx eslint src/ --ext .js,.jsx --max-warnings 0

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
  
    steps:
      - name: Code Checkout
        uses: actions/checkout@v4
        
      - name: setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci
   
      - name: Run tests with Coverage
        run: npm test -- --coverage --watchAll=false --ci
        env:
          CI: true

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/   
    
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Code Checkout
        uses: actions/checkout@v4
    
      - name: setup Node.js
        uses: actions/setup-node@v4
        with:
          version: '24'
          cache: 'npm'
    
      - name: Install Dependencies
        run: npm ci
    
      - name: Build Production bundle
        run: npm run build
        env:
          CI: true

      - name: Upload build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-artifact
          path: build/
                          
  docker-build-push:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: build    
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/dev'   
    steps:
      - name: Code Checkout           
        uses: actions/checkout@v4

      - name: Set Image Tag
        id: set-tag
        run: |
          BRANCH_NAME=${GITHUB_REF##*/}
          SHORT_SHA=${GITHUB_SHA::7}
          IMAGE_TAG="${BRANCH_NAME}-${SHORT_SHA}"

      - name: Display Bold Image Tag
        run: |
        # This will show the full path clearly in the logs
        echo -e "---------------------------------------------------"
        echo -e "BUILDING IMAGE: \033[1m${{ vars.DOCKER_USERNAME }}/${{ECR_REPOSITORY}}:${{ env.IMAGE_TAG }}\033[0m"
        echo -e "---------------------------------------------------"  
      
